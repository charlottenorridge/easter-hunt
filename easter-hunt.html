<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easter Egg Hunt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf8f0;color:#1a1a1a;min-height:100vh}
.wrap{max-width:460px;margin:0 auto;padding:2rem 1.25rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.team-pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:5px 16px;font-size:13px;font-weight:500;border:1.5px solid}
.loc-label{font-size:12px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;margin-bottom:.75rem;opacity:.55}
.section{border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem;font-weight:600}
.section-body{font-size:15px;line-height:1.65;color:#3a2a1a}
.task-card{border:1px solid}
.clue-card{border-left-width:4px;border-left-style:solid;border-top:1px solid #e0d0b8;border-right:1px solid #e0d0b8;border-bottom:1px solid #e0d0b8;border-radius:0 12px 12px 0;background:#fff}
.clue-text{font-family:Georgia,serif;font-size:16px;line-height:1.7;font-style:italic;color:#1a1a1a}
.dots{display:flex;gap:7px;justify-content:center;margin:1.5rem 0 .5rem}
.dot{width:9px;height:9px;border-radius:50%;background:#ddd}
.final-sec{background:#fff;border:1px solid #e0d0b8;border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem}
.final-sec h2{font-size:22px;font-weight:500;margin-bottom:.5rem}
.final-sec p{font-size:15px;color:#5a4a3a;line-height:1.65}
.btn-sm{display:inline-block;padding:5px 14px;border:1px solid #c8b090;border-radius:8px;font-size:12px;color:#7a6040;text-decoration:none;white-space:nowrap;background:transparent}
.btn-sm:hover{background:#f5ede0}
.admin-wrap{max-width:640px;margin:0 auto;padding:1.5rem 1.25rem}
.admin-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.team-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.team-tab{padding:6px 18px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid;background:transparent}
.url-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.url-row input{flex:1;padding:8px 10px;border:1px solid #c8b090;border-radius:8px;font-size:13px;color:#1a1a1a;background:#fdf8f0}
.gen-btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid;background:transparent;font-weight:500}
.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.qr-cell{border:1px solid #e0d0b8;border-radius:12px;padding:.875rem;text-align:center;background:#fff}
.qr-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.qr-sub{font-size:10px;color:#a08060;margin-bottom:.6rem;line-height:1.3;min-height:2em}
.qr-box{display:flex;justify-content:center;align-items:center;min-height:104px}
.qr-box img{display:block}
.qr-hash{font-size:9px;color:#c0b0a0;margin-top:.35rem;font-family:monospace}
.note{font-size:12px;color:#a08060;line-height:1.55;margin-top:1rem;text-align:center}
.ph{font-size:11px;color:#c0b0a0}
</style>
</head>
<body>
<div id="app"></div>
<script>
var LOC={
  faraday:{label:'Faraday statue',task:'Find the familiar face standing nearby. Ask him what his title is — and what the magic number is. Write it down.',clue:'A luminary of science stands immortalised nearby — his name synonymous with the invisible forces that power our world. Find the familiar face who keeps watch in his shadow.'},
  staffhouse:{label:'Staff House',task:'Take a photo on the benches, pretending you\'re enjoying a well-earned pint on a Friday evening. How many benches are there?',clue:'When five o\'clock strikes on a Friday, there\'s a spot on campus where colleagues trade their desks for something cold and golden. Find where they like to sit outside.'},
  pillow:{label:'Pillow sculpture',task:'Find the sticky note hidden on the sculpture. Counting from the bottom — which pillow is it on? That\'s your number.',clue:'To mark a significant birthday, the University commissioned an artwork that divided opinion — something bold and soft, bought at a cost not everyone thought wise. Find the cushioned controversy.'},
  bramhall:{label:'Bramhall',task:'Head inside and order an Orangina and a brownie. How much does it cost in total? That\'s your number.',clue:'A Cheshire village lends its name to a campus haunt beloved by the caffeine-dependent. Your hunt master is a regular — she knows the menu well.'},
  lapworth:{label:'Lapworth Museum',task:'Take a photo as if you\'re one of the exhibits — strike your best fossilised pose. If you were a member of the public, how much would it cost to enter? That\'s your final number.',clue:'Millions of years of Earth\'s story are gathered behind one set of doors — fossils, minerals, ancient creatures on display. Entry is free for some, but not for all.'}
};
var FINAL_CLUE='Your journey is nearly over. Return to the building where it all began. Climb to the third floor — room 310 is waiting. Bring every number you\'ve collected.';
var TEAMS={
  blue:{label:'Blue team',color:'#1558a8',bg:'#e8f0fa',border:'#a8c4e8',route:['faraday','staffhouse','pillow','bramhall','lapworth']},
  yellow:{label:'Yellow team',color:'#9a7a00',bg:'#fdf6d0',border:'#d4c060',route:['bramhall','lapworth','faraday','pillow','staffhouse']},
  pink:{label:'Pink team',color:'#b03070',bg:'#fae8f2',border:'#e0a0c0',route:['staffhouse','faraday','bramhall','lapworth','pillow']},
  green:{label:'Green team',color:'#2a7a30',bg:'#e8f5e8',border:'#88cc88',route:['lapworth','pillow','staffhouse','faraday','bramhall']}
};
var adminTeam='blue';

function dotsHtml(active,color){
  var h='<div class="dots">';
  for(var i=0;i<6;i++){
    var bg=i<=active?color:'#ddd';
    var op=i<active?'.35':'1';
    h+='<div class="dot" style="background:'+bg+';opacity:'+op+'"></div>';
  }
  return h+'</div>';
}

function renderStop(team,step){
  var t=TEAMS[team];
  if(!t)return renderError();
  var route=t.route;
  var task,clue,locLabel,stepLabel;
  if(step===0){
    stepLabel='The dungeon';locLabel='';
    task='Welcome, '+t.label+'! You\'re about to start the Easter egg hunt. Collect a number at each stop — you\'ll need the total at the end. Follow the clue below to find your first location.';
    clue=LOC[route[0]].clue;
  } else if(step>=1&&step<=5){
    var key=route[step-1];
    locLabel=LOC[key].label;stepLabel='Stop '+step+' of 5';
    task=LOC[key].task;
    clue=step===5?FINAL_CLUE:LOC[route[step]].clue;
  } else {
    return renderFinal(team);
  }
  return '<div class="wrap">'+
    '<div class="top-bar">'+
    '<div class="team-pill" style="color:'+t.color+';background:'+t.bg+';border-color:'+t.border+'">'+
    '<span style="width:10px;height:10px;border-radius:50%;background:'+t.color+';display:inline-block;flex-shrink:0"></span>'+
    t.label+' &mdash; '+stepLabel+
    '</div><a class="btn-sm" href="#admin">Print QR codes</a></div>'+
    (locLabel?'<div class="loc-label" style="color:'+t.color+'">'+locLabel+'</div>':'')+
    '<div class="section task-card" style="background:'+t.bg+';border-color:'+t.border+'">'+
    '<div class="section-label" style="color:'+t.color+'">Your task here</div>'+
    '<div class="section-body">'+task+'</div></div>'+
    '<div class="section clue-card" style="border-left-color:'+t.color+'">'+
    '<div class="section-label" style="color:'+t.color+'">Next clue</div>'+
    '<div class="clue-text">'+clue+'</div></div>'+
    dotsHtml(step,t.color)+'</div>';
}

function renderFinal(team){
  var t=TEAMS[team]||TEAMS.blue;
  return '<div class="wrap">'+
    '<div class="top-bar">'+
    '<div class="team-pill" style="color:'+t.color+';background:'+t.bg+';border-color:'+t.border+'">'+
    '<span style="width:10px;height:10px;border-radius:50%;background:'+t.color+';display:inline-block;flex-shrink:0"></span>'+
    t.label+' &mdash; Final stop</div>'+
    '<a class="btn-sm" href="#admin">Print QR codes</a></div>'+
    '<div class="final-sec"><h2 style="color:'+t.color+'">You made it!</h2>'+
    '<p>Head to <strong>room 310</strong> in the Watson Building.<br><br>Add up every number you collected across all five stops and tell the hunt master your total. Good luck!</p></div>'+
    dotsHtml(6,t.color)+'</div>';
}

function renderError(){
  return '<div class="wrap"><p style="color:#a08060;margin-top:2rem;font-size:15px">Page not found. <a href="#blue-0" style="color:#1558a8">Go to start</a></p></div>';
}

function teamTabsHtml(){
  return Object.keys(TEAMS).map(function(k){
    var t=TEAMS[k];var active=k===adminTeam;
    return '<button class="team-tab" onclick="switchAdminTeam(\''+k+'\')" style="color:'+t.color+';border-color:'+t.border+';background:'+(active?t.bg:'transparent')+'">'+t.label+'</button>';
  }).join('');
}

function renderAdmin(){
  var t=TEAMS[adminTeam];
  var steps=[
    {label:'The dungeon',sub:'Starting QR — place at start',step:0},
    {label:'Stop 1',sub:LOC[t.route[0]].label,step:1},
    {label:'Stop 2',sub:LOC[t.route[1]].label,step:2},
    {label:'Stop 3',sub:LOC[t.route[2]].label,step:3},
    {label:'Stop 4',sub:LOC[t.route[3]].label,step:4},
    {label:'Stop 5',sub:LOC[t.route[4]].label,step:5}
  ];
  var cells=steps.map(function(s,i){
    return '<div class="qr-cell">'+
      '<div class="qr-title">'+s.label+'</div>'+
      '<div class="qr-sub">'+s.sub+'</div>'+
      '<div class="qr-box" id="qr'+i+'"><span class="ph">Enter URL above</span></div>'+
      '<div class="qr-hash" id="qrh'+i+'"></div></div>';
  }).join('');
  return '<div class="admin-wrap">'+
    '<div class="admin-hd"><span style="font-size:17px;font-weight:500">Admin — QR codes</span>'+
    '<a class="btn-sm" href="#blue-0">Back to hunt</a></div>'+
    '<div class="team-tabs">'+teamTabsHtml()+'</div>'+
    '<div class="url-row">'+
    '<input id="baseUrl" type="text" placeholder="https://charlottenorridge.github.io/easter-hunt/easter-hunt.html" />'+
    '<button class="gen-btn" onclick="genQRs()" style="color:'+t.color+';border-color:'+t.color+'">Generate</button>'+
    '</div>'+
    '<div class="qr-grid">'+cells+'</div>'+
    '<p class="note">Showing QR codes for <strong>'+t.label+'</strong>. Switch teams above to print each set.<br>Print this page, cut out the codes, and place each at the corresponding stop.</p>'+
    '</div>';
}

function switchAdminTeam(team){
  adminTeam=team;
  var saved=document.getElementById('baseUrl')?document.getElementById('baseUrl').value:'';
  document.getElementById('app').innerHTML=renderAdmin();
  if(saved){document.getElementById('baseUrl').value=saved;genQRs();}
}

function genQRs(){
  var base=document.getElementById('baseUrl').value.trim().replace(/#.*/,'');
  if(!base)return;
  for(var i=0;i<6;i++){
    var el=document.getElementById('qr'+i);
    var hel=document.getElementById('qrh'+i);
    if(!el)continue;
    var hash=adminTeam+'-'+i;
    var url=base+'#'+hash;
    if(hel)hel.textContent='#'+hash;
    var img=document.createElement('img');
    img.src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(url);
    img.width=120;img.height=120;img.alt=hash;
    el.innerHTML='';
    el.appendChild(img);
  }
}

function render(){
  var raw=(location.hash||'').replace('#','')||'blue-0';
  var app=document.getElementById('app');
  if(raw==='admin'){app.innerHTML=renderAdmin();return;}
  var parts=raw.split('-');
  var team=parts[0];
  var step=parseInt(parts[1],10);
  if(TEAMS[team]&&!isNaN(step)){
    app.innerHTML=step===6?renderFinal(team):renderStop(team,step);
  } else {
    app.innerHTML=renderStop('blue',0);
  }
}
window.addEventListener('hashchange',render);
render();
</script>
</body>
</html>
